name: Monitor Editais

on:
  schedule:
    - cron: '0 9 * * *'   # todo dia às 06h (horário de Brasília = UTC-3)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necessário para commit do state.json

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scraper
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python -m src.main

      - name: Commit state.json
        run: |
          git config user.name "edital-bot"
          git config user.email "bot@mottriz"
          git add state.json comandos.txt
          git diff --staged --quiet || git commit -m "chore: atualiza state.json [$(date +%Y-%m-%d)]"
          git push
